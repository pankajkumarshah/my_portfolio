<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pankaj Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
}

.login-box{

width:350px;
padding:40px;
border-radius:20px;

background:rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

box-shadow:0 8px 32px rgba(0,0,0,0.3);

text-align:center;

animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.login-box h1{
color:white;
margin-bottom:25px;
}

.input-box{

margin:15px 0;
}

.input-box input{

width:100%;
padding:12px;

border:none;
outline:none;

border-radius:10px;

background:rgba(255,255,255,0.2);

color:white;

font-size:15px;
}

.input-box input::placeholder{
color:#ddd;
}

button{

width:100%;
padding:12px;

border:none;
border-radius:10px;

background:#ff66b2;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#ff3385;
}

#error{
margin-top:12px;
color:#ff8080;
}

.robot{
font-size:60px;
margin-bottom:15px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="login-box">

<div class="robot">🤖</div>

<h1>AI Portfolio Login</h1>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>


<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;


if(
username==="recruiter"
&&
password==="pankaj123"
){

localStorage.setItem("loggedIn","true");

window.location.href="index.html";

}

else{

document.getElementById("error")
.innerText="Invalid Username or Password";

}

}

</script>

</body>
</html>
